<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Sign Up – LocalConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    body { background: var(--bg-muted); min-height: 100vh; }
    .auth-wrapper { min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .auth-container { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-xl); padding: 2.5rem; width: 100%; max-width: 490px; border: 1px solid var(--border); animation: fadeIn .35s ease; }
    .auth-logo { display: flex; align-items: center; justify-content: center; gap: .5rem; margin-bottom: 1rem; text-decoration: none; }
    .auth-title { font-size: 1.55rem; font-weight: 800; text-align: center; color: var(--fg); margin-bottom: .3rem; }
    .auth-sub   { text-align: center; color: var(--fg-muted); font-size: .9rem; margin-bottom: 1.5rem; }
    .tab-bar { display: flex; background: var(--bg-muted); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 1.5rem; }
    .tab-btn { flex: 1; padding: .6rem; border: none; background: none; border-radius: calc(var(--radius-sm) - 2px); font-weight: 600; font-size: .9rem; cursor: pointer; transition: var(--transition); color: var(--fg-muted); }
    .tab-btn.active { background: #fff; color: var(--fg); box-shadow: var(--shadow-sm); }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; animation: fadeIn .2s ease; }
    .role-select { display: flex; flex-direction: column; gap: .6rem; margin-bottom: 1.2rem; }
    .role-option input { display: none; }
    .role-card { display: flex; align-items: center; gap: .9rem; padding: .9rem 1.1rem; border: 2px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); }
    .role-card:hover { border-color: var(--primary-light); }
    .role-card.sel-worker { border-color: var(--primary); background: rgba(37,99,235,.04); }
    .role-card.sel-giver  { border-color: var(--accent);  background: rgba(251,146,60,.04); }
    .role-icon  { font-size: 1.6rem; }
    .role-title { font-weight: 700; font-size: .95rem; }
    .role-desc  { font-size: .8rem; color: var(--fg-muted); }
    .auth-forgot { display: block; text-align: center; margin-top: .75rem; font-size: .85rem; color: var(--fg-muted); }
    .auth-terms { text-align: center; font-size: .8rem; color: var(--fg-muted); margin-top: .75rem; }
    .auth-terms a { color: var(--primary); text-decoration: underline; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="auth-wrapper">
    <div class="auth-container">
      <a href="../index.html" class="auth-logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text"><span class="logo-local">Local</span><span class="logo-connect">Connect</span></span>
      </a>
      <h1 class="auth-title">Welcome to Local Connect</h1>
      <p class="auth-sub">Connecting people with trusted local services</p>

      <div class="tab-bar">
        <button class="tab-btn active" id="tabLogin"  onclick="switchTab('login')">Log In</button>
        <button class="tab-btn"        id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN -->
      <div id="loginPanel" class="auth-panel active">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" />
        </div>
        <div id="loginError" class="form-error hidden"></div>
        <button class="btn btn-primary btn-full" id="loginBtn" onclick="handleLogin()">Sign In →</button>
        <a href="#" class="auth-forgot">Forgot your password?</a>
      </div>

      <!-- SIGNUP -->
      <div id="signupPanel" class="auth-panel">
        <div class="role-select">
          <label class="role-option">
            <input type="radio" name="role" value="worker" checked onchange="setRole('worker')" />
            <div class="role-card sel-worker" id="rcWorker">
              <span class="role-icon">👷</span>
              <div>
                <div class="role-title">Offer Services</div>
                <div class="role-desc">I provide household services (electrician, plumber, etc.)</div>
              </div>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="job_giver" onchange="setRole('job_giver')" />
            <div class="role-card" id="rcGiver">
              <span class="role-icon">🏠</span>
              <div>
                <div class="role-title">Need Services</div>
                <div class="role-desc">I need household services (cleaning, repairs, etc.)</div>
              </div>
            </div>
          </label>
        </div>
        <div class="form-row">
          <div class="form-group"><label>First Name</label><input type="text" id="signupFirst" placeholder="Ritik" /></div>
          <div class="form-group"><label>Last Name</label><input type="text" id="signupLast" placeholder="Kumar" /></div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="ritik@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Create a strong password (min 6 chars)" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="Confirm your password" />
        </div>
        <div id="signupError" class="form-error hidden"></div>
        <button class="btn btn-primary btn-full" id="signupBtn" onclick="handleSignup()">Create Account →</button>
        <p class="auth-terms">By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="../js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Already logged in? redirect
      if (LC.store.currentUser) {
        const u = LC.store.currentUser;
        window.location.href = u.role === 'job_giver' ? 'dashboard-jg.html' : 'dashboard-worker.html';
        return;
      }
      LC.nav.inject();

      const params = new URLSearchParams(location.search);
      if (params.get('tab') === 'signup') switchTab('signup');
      if (params.get('role'))             setRole(params.get('role'));
    });

    function switchTab(tab) {
      document.getElementById('loginPanel').classList.toggle('active',  tab === 'login');
      document.getElementById('signupPanel').classList.toggle('active', tab === 'signup');
      document.getElementById('tabLogin').classList.toggle('active',  tab === 'login');
      document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
      LC.utils.hideError('loginError');
      LC.utils.hideError('signupError');
    }

    function setRole(role) {
      document.getElementById('rcWorker').className = 'role-card' + (role === 'worker'    ? ' sel-worker' : '');
      document.getElementById('rcGiver').className  = 'role-card' + (role === 'job_giver' ? ' sel-giver'  : '');
      const ri = document.querySelector(`input[name="role"][value="${role}"]`);
      if (ri) ri.checked = true;
    }

    async function handleLogin() {
      LC.utils.hideError('loginError');
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) {
        LC.utils.showError('loginError', 'Please enter email and password.');
        return;
      }
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const user = await LC.store.login(email, password);
        LC.utils.showToast(`Welcome back, ${user.fullName}! 👋`, 'success');
        setTimeout(() => {
          window.location.href = user.role === 'job_giver' ? 'dashboard-jg.html' : 'dashboard-worker.html';
        }, 500);
      } catch (err) {
        LC.utils.showError('loginError', err.message || 'Login failed.');
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    }

    async function handleSignup() {
      LC.utils.hideError('signupError');
      const first    = document.getElementById('signupFirst').value.trim();
      const last     = document.getElementById('signupLast').value.trim();
      const email    = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirm  = document.getElementById('signupConfirm').value;
      const role     = document.querySelector('input[name="role"]:checked')?.value || 'worker';

      if (!first || !last || !email || !password) {
        LC.utils.showError('signupError', 'Please fill in all fields.'); return;
      }
      if (password.length < 6) {
        LC.utils.showError('signupError', 'Password must be at least 6 characters.'); return;
      }
      if (password !== confirm) {
        LC.utils.showError('signupError', "Passwords don't match."); return;
      }

      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      try {
        const user = await LC.store.signup(email, password, `${first} ${last}`, role);
        LC.utils.showToast(`Account created! Welcome, ${user.fullName}! 🎉`, 'success');
        setTimeout(() => {
          window.location.href = user.role === 'job_giver' ? 'dashboard-jg.html' : 'dashboard-worker.html';
        }, 500);
      } catch (err) {
        LC.utils.showError('signupError', err.message || 'Signup failed.');
        btn.disabled = false;
        btn.textContent = 'Create Account →';
      }
    }
  </script>
</body>
</html>
