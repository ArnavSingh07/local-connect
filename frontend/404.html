<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – LocalConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .notfound { min-height: calc(100vh - 64px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 3rem 2rem; }
    .notfound-num { font-size: 7rem; font-weight: 800; font-family: 'Sora',sans-serif; color: var(--border); line-height: 1; margin-bottom: .5rem; }
    .notfound h2 { font-size: 1.5rem; margin-bottom: .75rem; }
    .notfound p  { color: var(--fg-muted); margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div class="notfound fade-in">
    <div class="notfound-num">404</div>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="index.html" class="btn btn-primary btn-lg">Go Home</a>
  </div>
  <script src="../js/api.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => LC.nav.inject());</script>
</body>
</html>
